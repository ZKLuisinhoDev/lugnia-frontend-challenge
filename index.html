<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sumaq . Origen y Calidad</title>
    <!-- PrimeReact Theme Link -->
    <link id="theme-link" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primereact@10.9.7/resources/themes/lara-light-blue/theme.css">
    
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
